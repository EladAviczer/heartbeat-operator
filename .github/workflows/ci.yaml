name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main" ]

jobs:
  go-quality:
    name: Go Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Verify Dependencies
        run: go mod verify

      - name: Run Unit Tests
        run: go test -v -race ./...

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  helm-lint:
    name: Helm Chart Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint Chart
        run: helm lint charts/heartbeat-operator

  docker-publish:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [go-quality]
    permissions:
      contents: write 
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: eladavi/heartbeat-operator
          tags: |
            # Tag: "latest" (Only on main branch)
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag: "sha-abc1234" (Always)
            type=sha,format=short
            # Tag: "1.2.3" and "latest" behavior for tags (On git tag v1.2.3)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      
      - name: Update Helm Chart values.yaml
        if: github.event_name != 'pull_request'
        run: |
          # Extract short SHA (first 7 characters of github sha)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          NEW_TAG="sha-${SHORT_SHA}"
          
          # If this is a tag release (e.g. v1.2.3), use the tag name instead
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            NEW_TAG="${GITHUB_REF#refs/tags/}"
          fi
          
          echo "Updating image tag to ${NEW_TAG} in values.yaml"
          # yq is pre-installed on ubuntu-latest runners
          yq -i ".image.tag = \"${NEW_TAG}\"" charts/heartbeat-operator/values.yaml

      - name: Commit and Push changes
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if there are any changes (e.g., tag hasn't changed or it's a re-run)
          if git diff --quiet charts/heartbeat-operator/values.yaml; then
            echo "No changes in values.yaml, nothing to commit."
            exit 0
          fi
          
          git add charts/heartbeat-operator/values.yaml
          
          # We use NEW_TAG from environment if we exported it, but to be safe we'll re-parse
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          TAG_MSG="sha-${SHORT_SHA}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_MSG="${GITHUB_REF#refs/tags/}"
          fi
          
          # Include [skip ci] so this automated commit doesn't trigger another pipeline loop
          git commit -m "chore(helm): bump image tag to ${TAG_MSG} [skip ci]"
          git push